name: Signed release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing semantic-version tag to package
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: signed-release-${{ inputs.tag }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ inputs.tag }}

jobs:
  create-draft:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          gh release create "$RELEASE_TAG" --verify-tag --draft --generate-notes

  build:
    needs: create-draft
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
          - runner: macos-15-intel
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.3.app
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.tag }}

      - name: Set release version
        env:
          RELEASE_VERSION: ${{ inputs.tag }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          version="${RELEASE_VERSION#v}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $version" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" Info.plist

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.RELEASE_KEYCHAIN_PASSWORD }}
        run: |
          certificate_path="$RUNNER_TEMP/developer-id.p12"
          keychain_path="$RUNNER_TEMP/release-signing.keychain-db"
          printf '%s' "$CERTIFICATE_BASE64" | base64 --decode > "$certificate_path"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          identity=$(security find-identity -v -p codesigning "$keychain_path" | sed -n 's/.*"\(Developer ID Application:[^"]*\)".*/\1/p' | head -1)
          test -n "$identity"
          echo "CODE_SIGN_IDENTITY=$identity" >> "$GITHUB_ENV"
          echo "RELEASE_KEYCHAIN_PATH=$keychain_path" >> "$GITHUB_ENV"

      - name: Install notarization key
        env:
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          key_path="$RUNNER_TEMP/AuthKey.p8"
          printf '%s' "$APPLE_API_PRIVATE_KEY" > "$key_path"
          chmod 600 "$key_path"
          echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Test
        run: ./test.sh

      - name: Sign, notarize, and package
        env:
          TARGET_ARCH: ${{ matrix.arch }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: ./package-release.sh

      - name: Upload package
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_ARCH: ${{ matrix.arch }}
        run: |
          artifact=$(find build -maxdepth 1 -type f -name "*-$TARGET_ARCH.zip" -print -quit)
          test -n "$artifact"
          gh release upload "$RELEASE_TAG" "$artifact" --clobber

      - name: Remove signing material
        if: always()
        run: |
          security delete-keychain "$RELEASE_KEYCHAIN_PATH" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/developer-id.p12" "$RUNNER_TEMP/AuthKey.p8"

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Publish completed release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release edit "$RELEASE_TAG" --draft=false
