name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: macos-15
    timeout-minutes: 10
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.3.app

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Lint, test, and type-check
        run: ./test.sh
      - name: Build and verify source installation
        env:
          USAGE_MICRO_INSTALL_DIR: ${{ runner.temp }}/usage-micro-install
        run: ./install.sh --no-launch
